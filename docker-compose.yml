services:
  web:
    build:
      context: .
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: .
    command: ["python", "worker.py"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped