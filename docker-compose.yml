version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./web:/app/web
      - ./shared:/app/shared
    environment:
      - DB_PATH=/app/data/jobs.db
    restart: unless-stopped
    depends_on:
      - worker

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    volumes:
      - ./data:/app/data
      - ./worker:/app/worker
      - ./shared:/app/shared
    environment:
      - DB_PATH=/app/data/jobs.db
      - SCRAPE_INTERVAL_HOURS=${SCRAPE_INTERVAL_HOURS:-6}
    restart: unless-stopped
